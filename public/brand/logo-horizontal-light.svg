<svg xmlns="http://www.w3.org/2000/svg" width="520" height="180" viewBox="0 0 520 180" role="img" aria-label="Elodie Fleury  Immobilier & Conciergerie">
  <title>Elodie Fleury  logo horizontal clair</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&amp;family=Montserrat:wght@500&amp;display=swap');
      .wm   { font-family:'Cormorant Garamond', Georgia, serif; font-weight:500; letter-spacing:4px; fill:#F5EEE6; }
      .base { font-family:'Montserrat', Arial, sans-serif; font-weight:500; letter-spacing:4px; fill:#EFD0B6; }
      .mono { font-family:'Cormorant Garamond', Georgia, serif; font-weight:600; letter-spacing:-2px; fill:#F5EEE6; }
    </style>
  </defs>

  <g transform="translate(20,20) scale(0.7)">
    <circle cx="100" cy="100" r="90" fill="none" stroke="#BE5B42" stroke-width="2.8"/>
    <circle cx="100" cy="100" r="81" fill="none" stroke="#D9A152" stroke-width="1.2"/>
    <g fill="#D9A152">
      <circle cx="100" cy="60" r="3.4"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(45 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(90 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(135 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(180 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(225 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(270 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(315 100 60)"/>
    </g>
    <text x="100" y="132" text-anchor="middle" font-size="64" class="mono">EF</text>
  </g>

  <line x1="178" y1="40" x2="178" y2="140" stroke="#D9A152" stroke-width="1" opacity="0.5"/>

  <text x="205" y="92" font-size="40" class="wm">ELODIE FLEURY</text>
  <text x="207" y="120" font-size="11" class="base">IMMOBILIER · CONCIERGERIE</text>
</svg>
