<svg xmlns="http://www.w3.org/2000/svg" width="400" height="440" viewBox="0 0 400 440" role="img" aria-label="Elodie Fleury — version inversée">
  <title>Elodie Fleury — logo inversé sur terracotta</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&amp;family=Montserrat:wght@500&amp;family=Dancing+Script:wght@600&amp;display=swap');
      .wm   { font-family:'Cormorant Garamond', Georgia, serif; font-weight:500; letter-spacing:6px; fill:#F5EEE6; }
      .base { font-family:'Montserrat', Arial, sans-serif; font-weight:500; letter-spacing:5px; fill:#EFD0B6; }
      .scr  { font-family:'Dancing Script', cursive; font-weight:600; fill:#F0C9AC; }
      .mono { font-family:'Cormorant Garamond', Georgia, serif; font-weight:600; letter-spacing:-2px; fill:#F5EEE6; }
    </style>
  </defs>
  <rect x="0" y="0" width="400" height="440" rx="18" fill="#BE5B42"/>

  <g transform="translate(110,30) scale(0.9)">
    <circle cx="100" cy="100" r="90" fill="none" stroke="#F5EEE6" stroke-width="2.6"/>
    <circle cx="100" cy="100" r="81" fill="none" stroke="#E6B98C" stroke-width="1"/>
    <g fill="#E6B98C">
      <circle cx="100" cy="60" r="3.4"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(45 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(90 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(135 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(180 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(225 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(270 100 60)"/>
      <ellipse cx="100" cy="50" rx="3" ry="7.5" transform="rotate(315 100 60)"/>
    </g>
    <text x="100" y="132" text-anchor="middle" font-size="64" class="mono">EF</text>
    <g stroke="#E6B98C" stroke-width="1.4">
      <line x1="74" y1="152" x2="90" y2="152"/>
      <line x1="110" y1="152" x2="126" y2="152"/>
    </g>
    <rect x="96.5" y="148.5" width="7" height="7" transform="rotate(45 100 152)" fill="#F5EEE6"/>
  </g>

  <text x="206" y="295" text-anchor="middle" font-size="42" class="wm">ELODIE FLEURY</text>
  <line x1="92" y1="328" x2="132" y2="328" stroke="#E6B98C" stroke-width="1"/>
  <text x="200" y="332" text-anchor="middle" font-size="11" class="base">IMMOBILIER · CONCIERGERIE</text>
  <line x1="268" y1="328" x2="308" y2="328" stroke="#E6B98C" stroke-width="1"/>
  <text x="200" y="380" text-anchor="middle" font-size="30" class="scr">Tu casa, mi pasión</text>
</svg>
